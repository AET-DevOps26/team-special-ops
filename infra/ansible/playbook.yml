---
# Configure the Azure VM and deploy the tso stack with Docker Compose.
# Runs over SSH against the VM Terraform created (host passed via --inventory).
# Idempotent: every task converges, so re-runs are safe.
- name: Configure the Azure VM and deploy the tso stack
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Secrets come from the environment (GitHub Secrets in CD, your shell locally),
    # never from committed files. Asserted non-empty before any changes.
    jwt_secret: "{{ lookup('env', 'JWT_SECRET') }}"
    postgres_password: "{{ lookup('env', 'POSTGRES_PASSWORD') }}"
    logos_api_key: "{{ lookup('env', 'LOGOS_API_KEY') }}"

  tasks:
    - name: Require JWT and Postgres secrets before deploy
      ansible.builtin.assert:
        that:
          - jwt_secret | length > 0
          - postgres_password | length > 0
        fail_msg: >-
          JWT_SECRET and POSTGRES_PASSWORD must be set (GitHub Secrets in CD,
          or export locally before running ansible-playbook).

    # --- 1. Install Docker CE + the compose plugin from Docker's apt repo ------
    - name: Install apt prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: true

    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker's official GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add the Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        filename: docker
        state: present

    - name: Install Docker CE + compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker is running and enabled at boot
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    # --- 2. Ship the compose files + observability config to the VM -----------
    - name: Create the app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Copy the base compose file
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../docker-compose.yml"
        dest: "{{ app_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Copy the Azure compose overlay
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../docker-compose.azure.yml"
        dest: "{{ app_dir }}/docker-compose.azure.yml"
        mode: "0644"

    - name: Copy the observability config (prometheus + grafana)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../observability"
        dest: "{{ app_dir }}/"
        mode: "0644"
        directory_mode: "0755"

    - name: Template the .env (secrets + non-secret config)
      ansible.builtin.template:
        src: templates/env.j2
        dest: "{{ app_dir }}/.env"
        mode: "0600"

    # --- 3. Pull the GHCR images and bring the stack up -----------------------
    # build: never -> use only the pulled images (the base file's build: blocks
    # are ignored; the overlay supplies image: for every app service).
    - name: Pull images and start the stack
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        files:
          - docker-compose.yml
          - docker-compose.azure.yml
        pull: always
        build: never
        state: present
        remove_orphans: true
