---
# Configures the Azure VM and brings up the Team Special Ops stack via Docker
# Compose (base infra/docker-compose.yml + infra/docker-compose.azure.yml overlay).
#
# Run (inventory built from `terraform output`):
#   export JWT_SECRET=... POSTGRES_PASSWORD=... LOGOS_API_KEY=...
#   ansible-playbook -i '<public-ip>,' playbook.yml \
#     -u azureuser --private-key ~/.ssh/tso_azure \
#     -e domain=tso-special-ops.westeurope.cloudapp.azure.com -e image_tag=latest
- name: Pre-flight checks (controller)
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  tasks:
    - name: Assert required secrets are present in the environment
      ansible.builtin.assert:
        that:
          - lookup('env', 'JWT_SECRET') | length > 0
          - lookup('env', 'POSTGRES_PASSWORD') | length > 0
        fail_msg: >-
          JWT_SECRET and POSTGRES_PASSWORD must be exported before running this
          playbook (they are read by templates/env.j2).

- name: Deploy Team Special Ops to the Azure VM
  hosts: all
  become: true
  gather_facts: true

  vars:
    compose_files:
      - docker-compose.yml
      - docker-compose.azure.yml

  tasks:
    - name: Install prerequisite packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker apt GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present

    - name: Install Docker CE and the compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add the admin user to the docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Create the app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Copy compose files to the VM
      ansible.builtin.copy:
        src: "../{{ item }}"
        dest: "{{ app_dir }}/{{ item }}"
        mode: "0644"
      loop: "{{ compose_files }}"

    - name: Copy observability config to the VM
      ansible.builtin.copy:
        src: ../observability/
        dest: "{{ app_dir }}/observability/"
        mode: "0644"
        directory_mode: "0755"

    - name: Render the .env file
      ansible.builtin.template:
        src: env.j2
        dest: "{{ app_dir }}/.env"
        mode: "0600"
      no_log: true

    - name: Log in to GHCR (only when a token is provided)
      community.docker.docker_login:
        registry_url: ghcr.io
        username: "{{ ghcr_username }}"
        password: "{{ lookup('env', 'GHCR_TOKEN') }}"
      when:
        - ghcr_username | length > 0
        - lookup('env', 'GHCR_TOKEN') | length > 0
      no_log: true

    - name: Bring up the stack (pull images, never build on the VM)
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        files: "{{ compose_files }}"
        pull: always
        build: never
        state: present
        remove_orphans: true
