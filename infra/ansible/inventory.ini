# Placeholder inventory. The VM has no fixed address — Terraform creates it and
# its public IP changes per environment, so the host is supplied dynamically at
# run time instead of being committed here:
#
#   ansible-playbook playbook.yml \
#     --inventory "<public_ip>," \
#     --user "<admin_username>" \
#     --private-key <path-to-ssh-private-key>
#
# (The trailing comma makes Ansible treat the value as an inline host list, not a
# file path.) The CD workflow passes the live Terraform `public_ip` output this way.
#
# There is intentionally no host listed below.
