# Ansible Galaxy collections this playbook needs. Install with:
#   ansible-galaxy collection install -r infra/ansible/requirements.yml
collections:
  # community.docker: docker_compose_v2 module (pulls images + brings the stack up
  # on the VM over SSH). Needs the Docker SDK / CLI present on the target.
  - name: community.docker
    version: ">=3.10.0"
  # community.general: assorted helpers; kept for convenience/portability.
  - name: community.general
    version: ">=9.0.0"
