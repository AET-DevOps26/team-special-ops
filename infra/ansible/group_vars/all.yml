# Non-secret knobs for the VM deploy playbook. Override on the CLI with
# `-e key=value` (the CD workflow passes the live Terraform outputs this way).
#
# Secrets (jwt_secret, postgres_password, logos_api_key) are NOT here — they
# come from the environment via lookup('env', ...) in the playbook, sourced from
# GitHub Secrets in CD or your shell locally. Never commit real values.

# --- target VM / app -------------------------------------------------------
# Directory on the VM that holds the compose files, observability config, and .env.
app_dir: /opt/tso

# Public host Traefik serves and requests a Let's Encrypt cert for. CD overrides
# this with the Terraform `fqdn` output.
domain: tso-special-ops.westeurope.cloudapp.azure.com

# Image tag to deploy. CD overrides with sha-<short-sha>; `latest` is the moving
# main tag for a manual run.
image_tag: latest

# Email Let's Encrypt uses for expiry notices on the ACME account.
letsencrypt_email: devops@team-special-ops.example.com

# --- Postgres / app config (non-secret) ------------------------------------
postgres_user: tso
postgres_db: tso

# GenAI LLM endpoint (the key itself is a secret, injected separately).
llm_model: openai/gpt-oss-120b
llm_base_url: https://logos.aet.cit.tum.de:8080/v1
