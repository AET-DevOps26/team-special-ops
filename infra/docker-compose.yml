# Full local stack: Postgres + Spring services + GenAI + static web client + Traefik API Gateway.
# Run from repository root:
#   docker compose -f infra/docker-compose.yml up --build
#
# Optional: copy infra/env.example to infra/.env and adjust values.
# Access services via Traefik:
#   - Web Client: http://localhost:8080
#   - User Progress API: http://localhost:8080/api/user-progress
#   - Catalog API: http://localhost:8080/api/catalog
#   - Chat API: http://localhost:8080/api/chat
#   - GenAI API: http://localhost:8080/api/genai
#   - Traefik Dashboard: http://localhost:8000/dashboard/

name: team-special-ops

# --- Shared Spring service env (YAML anchors) ---
# Declared once so the datasource, CORS origin, and JWT secret can't drift
# across services. JWT_SECRET in particular MUST be identical between
# user-progress (which signs tokens) and chat (which verifies them) — a past
# bug where only chat received it caused 403s on every authenticated request.
# Deployments override these via env (k8s through Helm, Azure through the .env).
x-spring-base: &spring-base
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-tso}
  SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-tso}
  SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-tso}
  APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8080}

x-spring-auth: &spring-auth
  <<: *spring-base
  JWT_SECRET: ${JWT_SECRET:-your-secret-key-min-32-chars-change-in-production}

services:
  traefik:
    image: traefik:v3.7
    command:
      - --api.insecure=true
      - --api.dashboard=true
      - --entrypoints.web.address=:80
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --metrics.prometheus=true
      - --metrics.prometheus.addEntryPointsLabels=true
      - --metrics.prometheus.addServicesLabels=true
    ports:
      - "8080:80"
      - "8000:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.api-strip.stripprefix.prefixes=/api
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    labels:
      - autoheal=true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tso}
      POSTGRES_DB: ${POSTGRES_DB:-tso}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  user-progress:
    build:
      context: ..
      dockerfile: services/Dockerfile.spring
      args:
        SERVICE: user-progress
        JAVA_PKG: userprogress
        APP_PORT: 8081
    ports:
      - "8081:8081"
    labels:
      - autoheal=true
      - traefik.enable=true
      - traefik.http.routers.user-progress.rule=PathPrefix(`/api/user-progress`)
      - traefik.http.routers.user-progress.entrypoints=web
      - traefik.http.services.user-progress.loadbalancer.server.port=8081
      - traefik.http.routers.user-progress.middlewares=api-strip@docker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Shared datasource + CORS + JWT secret (see x-spring-auth anchor).
      # A service-specific Flyway history table + baseline keeps user-progress
      # migrations independent of catalog's, which also populates this schema.
      <<: *spring-auth
      SPRING_FLYWAY_TABLE: flyway_schema_history_user_progress
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  catalog:
    build:
      context: ..
      dockerfile: services/Dockerfile.spring
      args:
        SERVICE: catalog
        JAVA_PKG: catalog
        APP_PORT: 8082
    ports:
      - "8082:8082"
    labels:
      - autoheal=true
      - traefik.enable=true
      - traefik.http.routers.catalog.rule=PathPrefix(`/api/catalog`)
      - traefik.http.routers.catalog.entrypoints=web
      - traefik.http.services.catalog.loadbalancer.server.port=8082
      - traefik.http.routers.catalog.middlewares=api-strip@docker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Catalog endpoints are public, so it needs the datasource + CORS but not
      # the JWT secret (see x-spring-base anchor).
      <<: *spring-base
      # Catalog shares the single Postgres DB with user-progress/chat. Without
      # baseline-on-migrate + its own history table, catalog's Flyway aborts
      # ("non-empty schema without history table") whenever another service
      # creates its tables first — a startup race that flaked the E2E (catalog
      # exits 1). Mirror the baseline config the other two services already use.
      SPRING_FLYWAY_TABLE: flyway_schema_history_catalog
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  chat:
    build:
      context: ..
      dockerfile: services/Dockerfile.spring
      args:
        SERVICE: chat
        JAVA_PKG: chat
        APP_PORT: 8083
    ports:
      - "8083:8083"
    labels:
      - autoheal=true
      - traefik.enable=true
      - traefik.http.routers.chat.rule=PathPrefix(`/api/chat`)
      - traefik.http.routers.chat.entrypoints=web
      - traefik.http.services.chat.loadbalancer.server.port=8083
      - traefik.http.routers.chat.middlewares=api-strip@docker
    depends_on:
      postgres:
        condition: service_healthy
      catalog:
        condition: service_healthy
      user-progress:
        condition: service_healthy
      genai:
        condition: service_started
    environment:
      # Shared datasource + CORS + JWT secret (see x-spring-auth anchor).
      <<: *spring-auth
      SPRING_FLYWAY_TABLE: flyway_schema_history_chat
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      GENAI_BASE_URL: http://genai:8084
    restart: unless-stopped

  genai:
    build:
      context: ../services/genai
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    labels:
      - autoheal=true
      - traefik.enable=true
      - traefik.http.routers.genai.rule=PathPrefix(`/api/genai`)
      - traefik.http.routers.genai.entrypoints=web
      - traefik.http.services.genai.loadbalancer.server.port=8084
      - traefik.http.routers.genai.middlewares=api-strip@docker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LOGOS_API_KEY: ${LOGOS_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-oss-120b}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://logos.aet.cit.tum.de/v1}
    restart: unless-stopped

  web-client:
    build:
      context: ..
      dockerfile: web-client/Dockerfile
    labels:
      - autoheal=true
      - traefik.enable=true
      - traefik.http.routers.web-client.rule=PathPrefix(`/`)
      - traefik.http.routers.web-client.entrypoints=web
      - traefik.http.routers.web-client.priority=1
      - traefik.http.services.web-client.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus:/etc/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      traefik:
        condition: service_started
      user-progress:
        condition: service_started
      catalog:
        condition: service_started
      chat:
        condition: service_started
      genai:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  autoheal:
    image: willfarrell/autoheal:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_START_PERIOD: 0
      AUTOHEAL_INTERVAL: 5
    restart: unless-stopped

volumes:
  postgres_data:
