# Full local stack: Postgres + Spring services + GenAI + static web client.
# Run from repository root:
#   docker compose -f infra/docker-compose.yml up --build
#
# Optional: copy infra/env.example to infra/.env and adjust values.

name: team-special-ops

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tso}
      POSTGRES_DB: ${POSTGRES_DB:-tso}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  user-progress:
    build:
      context: ..
      dockerfile: services/Dockerfile.spring
      args:
        SERVICE: user-progress
        JAVA_PKG: userprogress
        APP_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Shares the single Postgres database (tso) with the other services.
      # A service-specific Flyway history table + baseline keeps user-progress
      # migrations independent of catalog's, which also populates this schema.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-tso}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-tso}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-tso}
      SPRING_FLYWAY_TABLE: flyway_schema_history_user_progress
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"

  catalog:
    build:
      context: ..
      dockerfile: services/Dockerfile.spring
      args:
        SERVICE: catalog
        JAVA_PKG: catalog
        APP_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-tso}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-tso}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-tso}

  chat:
    build:
      context: ..
      dockerfile: services/Dockerfile.spring
      args:
        SERVICE: chat
        JAVA_PKG: chat
        APP_PORT: 8083
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy

  genai:
    build:
      context: ../services/genai
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy

  web-client:
    build:
      context: ..
      dockerfile: web-client/Dockerfile
    ports:
      - "8080:80"

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus:/etc/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - user-progress
      - catalog
      - chat
      - genai

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
