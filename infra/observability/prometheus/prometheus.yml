global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: traefik
    metrics_path: /metrics
    static_configs:
      - targets: ['traefik:8080']
  - job_name: user-progress
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['user-progress:8081']
  - job_name: catalog
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['catalog:8082']
  - job_name: chat
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['chat:8083']
  - job_name: genai
    metrics_path: /metrics
    static_configs:
      - targets: ['genai:8084']
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
