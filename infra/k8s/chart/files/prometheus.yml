# Chart-local copy of the scrape config (do NOT edit infra/observability/ — that
# feeds the local docker-compose stack). Static targets = the in-cluster Service
# DNS names, which match the compose service names. No Traefik job (k8s uses nginx
# ingress) and no self-scrape/alerts (no Alertmanager in-namespace).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: user-progress
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['user-progress:8081']
  - job_name: catalog
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['catalog:8082']
  - job_name: chat
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['chat:8083']
  - job_name: genai
    metrics_path: /metrics
    static_configs:
      - targets: ['genai:8084']
