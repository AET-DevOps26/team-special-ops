# Azure (AKS) overrides. Only what differs from values.yaml.
#
# Images stay on the public GHCR repo (the chart default registry
# ghcr.io/aet-devops26), so no ACR / pull secret is needed on AKS.
#
# Deploy is the same one command as Rancher, just a different values file:
#   helm upgrade --install tso ./infra/k8s/chart -n tso --create-namespace \
#     -f ./infra/k8s/chart/values-azure.yaml \
#     --set image.tag="sha-$(git rev-parse --short HEAD)"
# (or: ./infra/k8s/deploy.sh azure)
#
# In CD this is driven by Ansible, which also passes the live ingress host from
# the Terraform output (`ingress_fqdn`) via --set ingress.host=..., so the value
# below is just a sane placeholder/default.

ingress:
  enabled: true
  className: nginx
  # <dns_label>.<location>.cloudapp.azure.com — Ansible overrides this with the
  # actual Terraform output so it always matches the DNS label on the public IP.
  host: tso-special-ops.westeurope.cloudapp.azure.com
  tls:
    enabled: true
    # Browser-trusted Let's Encrypt cert via cert-manager (ACME HTTP-01 through
    # ingress-nginx). The ClusterIssuer of this name is created by the Ansible
    # playbook. Switch to letsencrypt-staging while iterating to dodge rate limits.
    clusterIssuer: letsencrypt-prod

# Postgres stays in-cluster (StatefulSet + PVC); the PVC is backed by an Azure
# managed disk via the managed-csi storage class, so data survives pod restarts.
# Flyway still seeds schema + demo data on first boot — no DB import step.
postgres:
  storageClass: managed-csi
