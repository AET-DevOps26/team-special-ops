# Default values for the tso chart.
# These mirror the docker-compose setup so in-cluster behaviour matches local.
# Per-environment files (values-rancher.yaml, values-azure.yaml) override only
# what differs (hostnames, replica counts, TLS, etc).

image:
  registry: ghcr.io/aet-devops26
  # tag is set by CD to sha-<short-sha>. Empty falls back to the chart appVersion,
  # so `helm install` without --set still resolves to a real tag.
  tag: ""
  pullPolicy: IfNotPresent
  # Images are public (see project decision), so no pull secret is needed.
  # To switch to private images, set pullSecret to a docker-registry secret name
  # and create that secret (deploy.sh has a commented-out helper for this).
  pullSecret: ""

# One block per application service. templates/deployment.yaml and service.yaml
# range over this map, so adding a service is a values change, not a new template.
#
#   port        container + service port
#   replicas    desired pod count
#   db          true  -> inject SPRING_DATASOURCE_* + JWT_SECRET (DB-backed Spring service)
#               false -> no datasource env (stub / stateless service)
#   healthPath  HTTP path for liveness/readiness/startup probes
#   metricsPath Prometheus scrape path (omit -> no ServiceMonitor for this service)
#   nonRoot     run the container as UID 1000 (the Spring/genai images do; nginx does not)
#   extraEnv    service-specific plain env (non-secret)
services:
  user-progress:
    port: 8081
    replicas: 1
    db: true
    healthPath: /actuator/health
    metricsPath: /actuator/prometheus
    nonRoot: true
    extraEnv:
      # Keep user-progress' Flyway history separate from catalog's in the shared DB.
      SPRING_FLYWAY_TABLE: flyway_schema_history_user_progress
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
  catalog:
    port: 8082
    replicas: 1
    db: true
    healthPath: /actuator/health
    metricsPath: /actuator/prometheus
    nonRoot: true
    extraEnv:
      # Shares the tso DB/schema with user-progress. Keep a separate Flyway
      # history table and baseline-on-migrate so whichever service starts second
      # doesn't choke on the already-populated `public` schema.
      SPRING_FLYWAY_TABLE: flyway_schema_history_catalog
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
  chat:
    port: 8083
    replicas: 1
    db: true # reads catalog/user-progress tables + owns chat_question/chat_answer
    healthPath: /actuator/health
    metricsPath: /actuator/prometheus
    nonRoot: true
    extraEnv:
      # In-cluster genai address for the spoiler-safe Q&A flow.
      GENAI_BASE_URL: http://genai:8084
      # NB: chat's own application.yml already sets its Flyway history table +
      # baseline-on-migrate, so (unlike catalog/user-progress) no flyway env here.
  genai:
    port: 8084
    replicas: 1
    db: false
    healthPath: /genai/health
    metricsPath: /metrics
    nonRoot: true
    extraEnv:
      LLM_MODEL: openai/gpt-oss-120b
      LLM_BASE_URL: https://logos.aet.cit.tum.de/v1
    extraSecretEnv:
      LOGOS_API_KEY: LOGOS_API_KEY
  web-client:
    port: 80
    replicas: 1
    db: false
    healthPath: /
    nonRoot: false # nginx binds :80 and runs as root in the official image

postgres:
  image: postgres:16-alpine
  db: tso
  user: tso
  storage: 5Gi
  # "" = use the cluster's default StorageClass (works on Rancher and AKS).
  storageClass: ""

# Non-secret connection wiring shared by DB-backed services.
database:
  # Built into SPRING_DATASOURCE_URL: jdbc:postgresql://<host>:5432/<postgres.db>
  # host defaults to the postgres Service name created by this chart.
  host: ""

ingress:
  enabled: true
  className: nginx
  host: tso.local # overridden per environment
  tls:
    enabled: false # true on Azure (cert-manager)
    secretName: ""
    # cert-manager ClusterIssuer. letsencrypt-staging = high rate limits but
    # browser-untrusted (use while iterating); letsencrypt-prod = trusted cert
    # but 5 duplicate-certs/week per hostname (use for the final deploy).
    clusterIssuer: letsencrypt-prod

# Secrets: dev-only defaults. NEVER commit real values — CD injects them via --set
# or a values file that is not in git.
secrets:
  jwtSecret: "dev-only-change-me-min-32-characters-long!!"
  postgresPassword: "tso"
  logosApiKey: ""

# Applied to every container. Requests = scheduling guarantee, limits = ceiling.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 768Mi

# Reserved for a later PR (HPA); off by default.
autoscaling:
  enabled: false

# Observability for a Prometheus Operator (Rancher Monitoring / kube-prometheus-stack):
# a ServiceMonitor per metrics-exposing service, a PrometheusRule with alerts, and a
# Grafana dashboard ConfigMap. Off by default; enabled per-environment where the
# operator CRDs exist (see values-rancher.yaml).
monitoring:
  enabled: false
  interval: 30s
  # Extra labels on the ServiceMonitor/PrometheusRule. Some operators only select
  # objects carrying a specific label (e.g. release: rancher-monitoring). Leave empty
  # if the cluster's Prometheus selects all; set it if metrics/alerts don't appear.
  extraLabels: {}

# Self-hosted, in-namespace Prometheus + Grafana so the team can VIEW the live
# deployment's metrics without cluster-monitoring access (the ServiceMonitor above
# still feeds the cluster's Grafana for anyone who has cluster access). Off by default;
# enabled per-environment (see values-rancher.yaml). Static scrape targets -> no CRDs,
# no cluster RBAC.
selfMonitoring:
  enabled: false
  prometheus:
    image: prom/prometheus:v2.55.1
    retention: 6h            # short: this is a live-state view, keeps memory low
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 300m, memory: 512Mi }
  grafana:
    image: grafana/grafana:11.3.0
    anonymous: true          # no login; Viewer org role (view-only demo surface)
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: 250m, memory: 256Mi }
