{{/*
Routes traffic into the cluster.
- API ingress: /api/* paths go directly to the Spring services (nginx ingress strips
  /api and forwards), mirroring how Traefik routes them in docker-compose.
- SPA ingress: everything else hits the web-client for static SPA serving.
Two separate Ingress resources are required because rewrite-target applies to all paths
in a resource — mixing rewritten API paths with a pass-through SPA catch-all in one
resource is not possible without the catch-all failing admission validation.
TLS is terminated here via cert-manager on Rancher.
*/}}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "tso.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: $1
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-tls" .Release.Name) }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Strip /api prefix before forwarding to each Spring service.
          # e.g. /api/user-progress/auth/login → /user-progress/auth/login on port 8081
          - path: /api(/user-progress/.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: user-progress
                port:
                  number: {{ (index .Values.services "user-progress").port }}
          - path: /api(/catalog/.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: catalog
                port:
                  number: {{ (index .Values.services "catalog").port }}
          - path: /api(/chat/.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: chat
                port:
                  number: {{ (index .Values.services "chat").port }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-web
  labels:
    {{- include "tso.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer | default "letsencrypt-prod" }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-tls" .Release.Name) }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-client
                port:
                  number: {{ (index .Values.services "web-client").port }}
{{- end }}
