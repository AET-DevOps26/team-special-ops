{{/*
Sensitive config: DB password, JWT signing secret, Logos API key.
Kubernetes base64-encodes stringData for us. Real values come from CD (--set)
or an out-of-git values file — the defaults in values.yaml are dev-only.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    {{- include "tso.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  {{- if .Values.secrets.logosApiKey }}
  LOGOS_API_KEY: {{ .Values.secrets.logosApiKey | quote }}
  {{- end }}
