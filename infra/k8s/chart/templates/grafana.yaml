{{/*
Self-hosted Grafana (gated by selfMonitoring.enabled). Anonymous auth (no login);
datasource + dashboard provider provisioned via per-file subPath mounts; the
existing tso-overview.json dashboard reused. When ingress.grafana.enabled, serves
from the /grafana subpath via GF_SERVER_* env.
*/}}
{{- if .Values.selfMonitoring.enabled }}
{{- $sub := and (dig "grafana" "enabled" false .Values.ingress) .Values.ingress.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-grafana-provisioning
  labels:
    {{- include "tso.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
data:
  datasource.yaml: |
{{ .Files.Get "files/grafana/datasource.yaml" | indent 4 }}
  dashboards.yaml: |
{{ .Files.Get "files/grafana/dashboards.yaml" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-grafana-dashboards
  labels:
    {{- include "tso.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
data:
  tso-overview.json: |
{{ .Files.Get "dashboards/tso-overview.json" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-grafana
  labels:
    {{- include "tso.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "tso.selectorLabels" (dict "root" . "name" "grafana") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tso.labels" . | nindent 8 }}
        {{- include "tso.selectorLabels" (dict "root" . "name" "grafana") | nindent 8 }}
      annotations:
        checksum/provisioning: {{ printf "%s%s" (.Files.Get "files/grafana/datasource.yaml") (.Files.Get "files/grafana/dashboards.yaml") | sha256sum }}
        checksum/dashboards: {{ .Files.Get "dashboards/tso-overview.json" | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
      # No API access needed; drop the SA token from the internet-exposed pod.
      automountServiceAccountToken: false
      containers:
        - name: grafana
          image: {{ .Values.selfMonitoring.grafana.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- if .Values.selfMonitoring.grafana.anonymous }}
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
            {{- end }}
            {{- if $sub }}
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s{{ .Values.ingress.grafana.path }}/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: GF_SERVER_DOMAIN
              value: {{ .Values.ingress.host | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: {{ if $sub }}{{ .Values.ingress.grafana.path }}{{ end }}/api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ if $sub }}{{ .Values.ingress.grafana.path }}{{ end }}/api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
              subPath: datasource.yaml
              readOnly: true
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards/tso-overview.json
              subPath: tso-overview.json
              readOnly: true
          resources:
            {{- toYaml .Values.selfMonitoring.grafana.resources | nindent 12 }}
      volumes:
        - name: data
          emptyDir: {}
        - name: provisioning
          configMap:
            name: {{ .Release.Name }}-grafana-provisioning
        - name: dashboards
          configMap:
            name: {{ .Release.Name }}-grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-grafana
  labels:
    {{- include "tso.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    {{- include "tso.selectorLabels" (dict "root" . "name" "grafana") | nindent 4 }}
{{- end }}
