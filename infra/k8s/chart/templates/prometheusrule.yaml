{{/*
Alerts for the cluster's Prometheus Operator. Ported from the docker-compose setup
(infra/observability/prometheus/alerts.yml) so local and in-cluster alerting match.
The {{`{{ ... }}`}} sequences are Prometheus/Go templating passed through literally —
Helm must not evaluate them.
*/}}
{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-alerts
  labels:
    {{- include "tso.labels" . | nindent 4 }}
    {{- with .Values.monitoring.extraLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: tso-alerts
      rules:
        - alert: ServiceDown
          expr: up{job=~"user-progress|catalog|chat|genai"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Service {{`{{ $labels.job }}`}} is down"
            description: "Target {{`{{ $labels.instance }}`}} for job {{`{{ $labels.job }}`}} has been unreachable for more than 1 minute."
        - alert: HighErrorRate
          expr: |
            sum by (application) (rate(http_server_requests_seconds_count{outcome="SERVER_ERROR"}[5m]))
              / sum by (application) (rate(http_server_requests_seconds_count[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High 5xx error rate for {{`{{ $labels.application }}`}}"
            description: "Service {{`{{ $labels.application }}`}} has a 5xx error ratio of {{`{{ $value }}`}} (above 0.05) over the last 5 minutes."
{{- end }}
