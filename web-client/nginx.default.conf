server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolving the backend names through a variable in proxy_pass (below) defers
    # lookup to request time, so nginx starts even if a backend isn't up yet and
    # picks up new IPs on restart — unlike a bare `proxy_pass http://catalog:8082;`,
    # which resolves once at startup and fails hard with "host not found in upstream".
    #
    # ${NGINX_LOCAL_RESOLVERS} is filled in at container start by nginx's stock
    # 15-local-resolvers.envsh from /etc/resolv.conf: Docker's embedded DNS
    # (127.0.0.11) under compose, CoreDNS under Kubernetes. (envsubst only touches
    # this env var; nginx's own $variables below are left intact.)
    resolver ${NGINX_LOCAL_RESOLVERS} valid=10s ipv6=off;

    # API requests are reverse-proxied to the backend services by name, keeping the
    # browser on a single origin (:8080) so no CORS is needed. $request_uri
    # preserves the full path (incl. the /catalog prefix the service expects)
    # because a variable proxy_pass does not append it.
    #
    # ${UPSTREAM_DNS_SUFFIX} (filled in by envsubst at startup) is empty under
    # docker-compose, where Docker's DNS resolves bare names like `catalog`. Under
    # Kubernetes it's `.<namespace>.svc.cluster.local`, because CoreDNS won't resolve
    # a single-label name through nginx's resolver — it needs the FQDN.
    location /catalog/ {
        set $catalog_upstream catalog${UPSTREAM_DNS_SUFFIX}:8082;
        proxy_pass http://$catalog_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /user-progress/ {
        set $userprogress_upstream user-progress${UPSTREAM_DNS_SUFFIX}:8081;
        proxy_pass http://$userprogress_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /chat/ {
        set $chat_upstream chat${UPSTREAM_DNS_SUFFIX}:8083;
        proxy_pass http://$chat_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else is the single-page app. Unknown paths fall back to
    # index.html so client-side routes (e.g. /series/:id) load the SPA.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
