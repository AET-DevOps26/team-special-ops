server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files and fall back to index.html for SPA client-side routes.
    # Traefik (API Gateway) handles all /api/* routing to backend services,
    # so nginx only needs to serve the static SPA bundle.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
