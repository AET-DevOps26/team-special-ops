server:
  port: 8081

spring:
  application:
    name: user-progress
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tso}
    username: ${SPRING_DATASOURCE_USERNAME:tso}
    password: ${SPRING_DATASOURCE_PASSWORD:tso}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

jwt:
  secret: ${JWT_SECRET:your-secret-key-min-32-chars-change-in-production}
  expiration: ${JWT_EXPIRATION:900}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
