server:
  port: 8082

spring:
  application:
    name: catalog
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tso}
    username: ${SPRING_DATASOURCE_USERNAME:tso}
    password: ${SPRING_DATASOURCE_PASSWORD:tso}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
