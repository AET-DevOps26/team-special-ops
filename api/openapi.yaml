openapi: 3.1.0
info:
  title: Spoiler-Safe TV Q&A API
  version: 0.1.0
  description: |
    Single source of truth. v0 contains only health endpoints; real endpoints
    are added in subsequent backlog items.

servers:
  - url: http://localhost:8081
    description: user-progress (local)
  - url: http://localhost:8082
    description: catalog (local)
  - url: http://localhost:8083
    description: chat (local)
  - url: http://localhost:8084
    description: genai (local)

paths:
  /user-progress/health:
    get:
      tags: [user-progress]
      operationId: userProgressHealth
      summary: Health check
      responses:
        '200':
          $ref: '#/components/responses/Health'

  /user-progress/auth/signup:
    post:
      tags: [user-progress]
      operationId: userProgressAuthSignup
      summary: Create account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user-progress/auth/login:
    post:
      tags: [user-progress]
      operationId: userProgressAuthLogin
      summary: Sign in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user-progress/auth/me:
    get:
      tags: [user-progress]
      operationId: userProgressAuthMe
      summary: Current user (session check)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user-progress/progress:
    get:
      tags: [progress]
      operationId: getProgress
      summary: List the current user's watch progress across all series
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Progress entries for the current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProgressEntry'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [progress]
      operationId: updateProgress
      summary: Set the current user's progress for one series (upsert)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProgressRequest'
      responses:
        '200':
          description: Updated progress entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressEntry'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /catalog/health:
    get:
      tags: [catalog]
      operationId: catalogHealth
      summary: Health check
      responses:
        '200':
          $ref: '#/components/responses/Health'

  /catalog/series:
    get:
      tags: [catalog]
      operationId: listSeries
      summary: List all series in the catalog
      responses:
        '200':
          description: List of series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SeriesSummary'

  /catalog/series/{id}/episodes:
    get:
      tags: [catalog]
      operationId: listSeriesEpisodes
      summary: List episodes for a series, ordered by global episode index
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of episodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Episode'
        '404':
          description: Series not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /chat/health:
    get:
      tags: [chat]
      operationId: chatHealth
      summary: Health check
      responses:
        '200':
          $ref: '#/components/responses/Health'

  /genai/health:
    get:
      tags: [genai]
      operationId: genaiHealth
      summary: Health check
      responses:
        '200':
          $ref: '#/components/responses/Health'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token. Obtain from /user-progress/auth/login

  responses:
    Health:
      description: Service is up
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HealthStatus'

  schemas:
    HealthStatus:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
          example: catalog

    SeriesSummary:
      type: object
      required: [id, title, seasonsCount, episodesCount]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: Stranger Things
        seasonsCount:
          type: integer
          minimum: 1
        episodesCount:
          type: integer
          minimum: 1

    Episode:
      type: object
      required: [id, season, episodeNumber, episodeIndex, title, summary]
      properties:
        id:
          type: string
          format: uuid
        season:
          type: integer
          minimum: 1
        episodeNumber:
          type: integer
          minimum: 1
        episodeIndex:
          type: integer
          minimum: 1
        title:
          type: string
        summary:
          type: string

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_FAILED
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    UserSummary:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email

    AuthResponse:
      type: object
      required: [accessToken, tokenType, user]
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          enum: [Bearer]
        user:
          $ref: '#/components/schemas/UserSummary'

    ProgressEntry:
      type: object
      required: [seriesId, episodeIndex, updatedAt]
      properties:
        seriesId:
          type: string
          format: uuid
        episodeIndex:
          type: integer
          minimum: 0
        updatedAt:
          type: string
          format: date-time

    UpdateProgressRequest:
      type: object
      required: [seriesId, episodeIndex]
      properties:
        seriesId:
          type: string
          format: uuid
        episodeIndex:
          type: integer
          minimum: 0
