name: CD (Azure)

# Provisions a Linux VM with Terraform, then configures it and deploys the
# docker-compose stack with Ansible (over SSH). Manual by default because the VM
# bills while it runs — a scheduled/auto deploy would quietly burn credit. Flip
# `deploy` on push if you want merge-to-main -> live (and accept the running cost).
on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        type: choice
        default: deploy
        options:
          - deploy
          - destroy
      image_tag:
        description: "Image tag to deploy (e.g. sha-abc1234). Blank = latest."
        type: string
        default: ""
      confirm:
        description: "Type DESTROY to confirm teardown (only used when action=destroy)."
        type: string
        default: ""

# Never let two infra runs touch the same Terraform state / VM at once.
concurrency:
  group: cd-azure
  cancel-in-progress: false

permissions:
  id-token: write # required for azure/login OIDC token exchange
  contents: read

env:
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'deploy' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # OIDC: exchanges the GitHub token for Azure access — no client secret stored.
      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9.5"

      - name: Terraform init (remote state)
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=${{ secrets.TFSTATE_KEY }}"

      # The VM's authorised SSH key. Provided as TF_VAR_* so Terraform picks it up
      # without a committed value; the matching private key is used by Ansible below.
      - name: Terraform apply
        working-directory: infra/terraform
        env:
          TF_VAR_admin_ssh_public_key: ${{ secrets.AZURE_VM_SSH_PUBLIC_KEY }}
        run: terraform apply -auto-approve -input=false

      # Read the outputs Ansible needs: the VM address, SSH user, and public host.
      - name: Capture Terraform outputs
        id: tf
        working-directory: infra/terraform
        run: |
          echo "public_ip=$(terraform output -raw public_ip)"           >> "$GITHUB_OUTPUT"
          echo "fqdn=$(terraform output -raw fqdn)"                     >> "$GITHUB_OUTPUT"
          echo "admin_username=$(terraform output -raw admin_username)" >> "$GITHUB_OUTPUT"

      # Write the SSH private key Ansible connects with. Passed via env (not inline)
      # to avoid script injection; file is 0600 so SSH accepts it.
      - name: Write SSH private key
        env:
          AZURE_VM_SSH_PRIVATE_KEY: ${{ secrets.AZURE_VM_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/tso_azure
          printf '%s\n' "$AZURE_VM_SSH_PRIVATE_KEY" > ~/.ssh/tso_azure

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Ansible + collections
        run: |
          pip install "ansible-core>=2.16"
          ansible-galaxy collection install -r infra/ansible/requirements.yml

      # Wait until the freshly-booted VM accepts SSH before handing off to Ansible.
      - name: Wait for SSH
        env:
          PUBLIC_IP: ${{ steps.tf.outputs.public_ip }}
          ADMIN_USER: ${{ steps.tf.outputs.admin_username }}
        run: |
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
                 -i ~/.ssh/tso_azure "${ADMIN_USER}@${PUBLIC_IP}" true 2>/dev/null; then
              echo "SSH is up."
              exit 0
            fi
            echo "Waiting for SSH ($i/30)..."
            sleep 10
          done
          echo "VM did not accept SSH in time." >&2
          exit 1

      - name: Ansible deploy (configure VM + docker compose)
        working-directory: infra/ansible
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          LOGOS_API_KEY: ${{ secrets.LOGOS_API_KEY }}
          PUBLIC_IP: ${{ steps.tf.outputs.public_ip }}
          ADMIN_USER: ${{ steps.tf.outputs.admin_username }}
          DOMAIN: ${{ steps.tf.outputs.fqdn }}
          IMAGE_TAG: ${{ inputs.image_tag != '' && inputs.image_tag || 'latest' }}
        run: |
          ansible-playbook playbook.yml \
            --inventory "${PUBLIC_IP}," \
            --user "${ADMIN_USER}" \
            --private-key ~/.ssh/tso_azure \
            -e "domain=${DOMAIN}" \
            -e "image_tag=${IMAGE_TAG}"

      - name: Summary
        env:
          FQDN: ${{ steps.tf.outputs.fqdn }}
        run: |
          echo "Deployed. App will be live at: https://${FQDN}" >> "$GITHUB_STEP_SUMMARY"
          echo "(Traefik may take a minute to issue the Let's Encrypt cert.)" >> "$GITHUB_STEP_SUMMARY"

  # Manual teardown: `terraform destroy` deletes the VM, disk, NIC, and public IP
  # so charges stop. Run from Actions with action=destroy and confirm=DESTROY.
  #
  # Double-gated so a casual dispatch cannot wipe the VM:
  #   1. confirm input must equal DESTROY (typed confirmation), and
  #   2. azure-destroy environment pauses for a required reviewer
  #      (Settings -> Environments -> azure-destroy -> Required reviewers).
  destroy:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && inputs.confirm == 'DESTROY' }}
    runs-on: ubuntu-latest
    environment: azure-destroy
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9.5"

      - name: Terraform init (remote state)
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=${{ secrets.TFSTATE_KEY }}"

      # admin_ssh_public_key has no default, so destroy must also receive it to
      # evaluate the config (no resources are created — it's torn down).
      - name: Terraform destroy
        working-directory: infra/terraform
        env:
          TF_VAR_admin_ssh_public_key: ${{ secrets.AZURE_VM_SSH_PUBLIC_KEY }}
        run: terraform destroy -auto-approve -input=false
