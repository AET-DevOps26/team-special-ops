name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege token: jobs only read source + PR metadata.
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which areas changed so the heavy per-service jobs only run when
  # their code (or the shared OpenAPI spec / this workflow) is touched.
  changes:
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.filter.outputs.java }}
      genai: ${{ steps.filter.outputs.genai }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            java:
              - 'services/catalog/**'
              - 'services/chat/**'
              - 'services/user-progress/**'
              - 'services/pom.xml'
              - 'services/mvnw'
              - 'services/.mvn/**'
              - 'api/**'
              - '.github/workflows/ci.yml'
            genai:
              - 'services/genai/**'
              - 'api/**'
              - '.github/workflows/ci.yml'
            web:
              - 'web-client/**'
              - 'api/**'
              - '.github/workflows/ci.yml'

  spec-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-client/pnpm-lock.yaml
      - run: pnpm --package=@redocly/cli@2.30.5 dlx redocly lint api/openapi.yaml

  java-services:
    needs: [spec-lint, changes]
    # On push to main, run regardless of path filter so publish-images (which
    # needs all three service jobs) always has fresh images for the SHA.
    if: github.event_name == 'push' || needs.changes.outputs.java == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user-progress, catalog, chat]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-client/pnpm-lock.yaml
      - name: Regenerate Java stubs from OpenAPI spec
        run: ./api/scripts/gen-all.sh java
      - name: Build + test + lint
        working-directory: services
        run: ./mvnw -B -pl ${{ matrix.service }} verify

  genai:
    needs: [spec-lint, changes]
    if: github.event_name == 'push' || needs.changes.outputs.genai == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Regenerate Python client from OpenAPI spec
        run: ./api/scripts/gen-all.sh python
      - name: Sync dependencies
        working-directory: services/genai
        run: uv sync --extra dev
      - name: Lint
        working-directory: services/genai
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test
        working-directory: services/genai
        run: uv run pytest -v

  web-client:
    needs: [spec-lint, changes]
    if: github.event_name == 'push' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-client/pnpm-lock.yaml
      - name: Regenerate TS types from OpenAPI spec
        run: ./api/scripts/gen-all.sh ts
      - name: Install deps
        working-directory: web-client
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: web-client
        run: pnpm lint
      - name: Test
        working-directory: web-client
        run: pnpm test
      - name: Build
        working-directory: web-client
        run: pnpm build

  # Build all five service images and push them to GitHub Container Registry.
  # Runs only after the test jobs pass (so a red build never publishes) and only
  # on push to main — pull requests still run the tests above but publish nothing.
  # Each image is tagged with both the commit SHA (immutable, what the Helm chart
  # deploys for reproducible/rollback-able releases) and a moving `main`/`latest`.
  publish-images:
    needs: [java-services, genai, web-client]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # The three Spring services share one multi-stage Dockerfile, built from
          # the repo root and differentiated by build args.
          - image: tso-user-progress
            context: .
            file: services/Dockerfile.spring
            build-args: |
              SERVICE=user-progress
              JAVA_PKG=userprogress
              APP_PORT=8081
          - image: tso-catalog
            context: .
            file: services/Dockerfile.spring
            build-args: |
              SERVICE=catalog
              JAVA_PKG=catalog
              APP_PORT=8082
          - image: tso-chat
            context: .
            file: services/Dockerfile.spring
            build-args: |
              SERVICE=chat
              JAVA_PKG=chat
              APP_PORT=8083
          # genai builds from its own directory; the Dockerfile is self-contained.
          - image: tso-genai
            context: services/genai
            file: services/genai/Dockerfile
            build-args: ""
          # web-client builds from the repo root (it needs api/openapi.yaml in context).
          - image: tso-web-client
            context: .
            file: web-client/Dockerfile
            build-args: ""
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          # metadata-action lowercases the image name for us (GHCR requires it).
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          build-args: ${{ matrix.build-args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
