name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spec-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-client/pnpm-lock.yaml
      - run: pnpm --package=@redocly/cli@2.30.5 dlx redocly lint api/openapi.yaml

  java-services:
    needs: spec-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user-progress, catalog, chat]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-client/pnpm-lock.yaml
      - name: Regenerate Java stubs from OpenAPI spec
        run: ./api/scripts/gen-all.sh java
      - name: Build + test + lint
        working-directory: services
        run: ./mvnw -B -pl ${{ matrix.service }} verify

  genai:
    needs: spec-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v3
      - name: Regenerate Python client from OpenAPI spec
        run: ./api/scripts/gen-all.sh python
      - name: Sync dependencies
        working-directory: services/genai
        run: uv sync --extra dev
      - name: Lint
        working-directory: services/genai
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test
        working-directory: services/genai
        run: uv run pytest -v

  web-client:
    needs: spec-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-client/pnpm-lock.yaml
      - name: Regenerate TS types from OpenAPI spec
        run: ./api/scripts/gen-all.sh ts
      - name: Install deps
        working-directory: web-client
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: web-client
        run: pnpm lint
      - name: Test
        working-directory: web-client
        run: pnpm test
      - name: Build
        working-directory: web-client
        run: pnpm build
