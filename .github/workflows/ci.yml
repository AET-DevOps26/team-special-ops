name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege token: jobs only read source + PR metadata.
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which areas changed so the heavy per-service jobs only run when
  # their code (or the shared OpenAPI spec / this workflow) is touched.
  changes:
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.filter.outputs.java }}
      genai: ${{ steps.filter.outputs.genai }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            java:
              - 'services/catalog/**'
              - 'services/chat/**'
              - 'services/user-progress/**'
              - 'services/pom.xml'
              - 'services/mvnw'
              - 'services/.mvn/**'
              - 'api/**'
              - '.github/workflows/ci.yml'
            genai:
              - 'services/genai/**'
              - 'api/**'
              - '.github/workflows/ci.yml'
            web:
              - 'web-client/**'
              - 'api/**'
              - '.github/workflows/ci.yml'

  spec-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-client/pnpm-lock.yaml
      - run: pnpm --package=@redocly/cli@2.30.5 dlx redocly lint api/openapi.yaml

  java-services:
    needs: [spec-lint, changes]
    # On push to main, run regardless of path filter so publish-images (which
    # needs all three service jobs) always has fresh images for the SHA.
    if: github.event_name == 'push' || needs.changes.outputs.java == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user-progress, catalog, chat]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-client/pnpm-lock.yaml
      - name: Regenerate Java stubs from OpenAPI spec
        run: ./api/scripts/gen-all.sh java
      - name: Build + test + lint
        working-directory: services
        run: ./mvnw -B -pl ${{ matrix.service }} verify

  genai:
    needs: [spec-lint, changes]
    if: github.event_name == 'push' || needs.changes.outputs.genai == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
      - name: Regenerate Python client from OpenAPI spec
        run: ./api/scripts/gen-all.sh python
      - name: Sync dependencies
        working-directory: services/genai
        run: uv sync --extra dev
      - name: Lint
        working-directory: services/genai
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test
        working-directory: services/genai
        run: uv run pytest -v

  web-client:
    needs: [spec-lint, changes]
    if: github.event_name == 'push' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-client/pnpm-lock.yaml
      - name: Regenerate TS types from OpenAPI spec
        run: ./api/scripts/gen-all.sh ts
      - name: Install deps
        working-directory: web-client
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: web-client
        run: pnpm lint
      - name: Test
        working-directory: web-client
        run: pnpm test
      - name: Build
        working-directory: web-client
        run: pnpm build

  # Build all five service images and push them to GitHub Container Registry.
  # Runs only after the test jobs pass (so a red build never publishes) and only
  # on push to main — pull requests still run the tests above but publish nothing.
  # Each image is tagged with both the commit SHA (immutable, what the Helm chart
  # deploys for reproducible/rollback-able releases) and a moving `main`/`latest`.
  publish-images:
    needs: [java-services, genai, web-client]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # The three Spring services share one multi-stage Dockerfile, built from
          # the repo root and differentiated by build args.
          - image: tso-user-progress
            context: .
            file: services/Dockerfile.spring
            build-args: |
              SERVICE=user-progress
              JAVA_PKG=userprogress
              APP_PORT=8081
          - image: tso-catalog
            context: .
            file: services/Dockerfile.spring
            build-args: |
              SERVICE=catalog
              JAVA_PKG=catalog
              APP_PORT=8082
          - image: tso-chat
            context: .
            file: services/Dockerfile.spring
            build-args: |
              SERVICE=chat
              JAVA_PKG=chat
              APP_PORT=8083
          # genai builds from its own directory; the Dockerfile is self-contained.
          - image: tso-genai
            context: services/genai
            file: services/genai/Dockerfile
            build-args: ""
          # web-client builds from the repo root (it needs api/openapi.yaml in context).
          - image: tso-web-client
            context: .
            file: web-client/Dockerfile
            build-args: ""
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          # metadata-action lowercases the image name for us (GHCR requires it).
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          build-args: ${{ matrix.build-args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
