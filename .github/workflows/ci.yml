name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spec-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-client/pnpm-lock.yaml
      - run: pnpm --package=@redocly/cli@2.30.5 dlx redocly lint api/openapi.yaml

  java-services:
    needs: spec-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user-progress, catalog, chat]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-client/pnpm-lock.yaml
      - name: Regenerate Java stubs from OpenAPI spec
        run: ./api/scripts/gen-all.sh java
      - name: Build + test + lint
        working-directory: services
        run: ./mvnw -B -pl ${{ matrix.service }} verify

  genai:
    needs: spec-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v3
      - name: Regenerate Python client from OpenAPI spec
        run: ./api/scripts/gen-all.sh python
      - name: Sync dependencies
        working-directory: services/genai
        run: uv sync --extra dev
      - name: Lint
        working-directory: services/genai
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test
        working-directory: services/genai
        run: uv run pytest -v

  web-client:
    needs: spec-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-client/pnpm-lock.yaml
      - name: Regenerate TS types from OpenAPI spec
        run: ./api/scripts/gen-all.sh ts
      - name: Install deps
        working-directory: web-client
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: web-client
        run: pnpm lint
      - name: Test
        working-directory: web-client
        run: pnpm test
      - name: Build
        working-directory: web-client
        run: pnpm build


  e2e-tests:
    needs: [java-services, genai, web-client]
    name: Run E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use your project's Node version

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8 # Use your project's pnpm version

      - name: Build Docker images
        run: docker compose -f infra/docker-compose.yml build

      - name: Install dependencies
        run: pnpm install
        working-directory: web-client

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
        working-directory: web-client


      - name: Run E2E tests
        run: pnpm test:e2e
        working-directory: web-client

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always() # Ensures the report uploads even if tests fail
        with:
          name: playwright-report
          path: web-client/playwright-report/
          retention-days: 7

  # Build all five service images and push them to GitHub Container Registry.
  # Runs only after the test jobs pass (so a red build never publishes) and only
  # on push to main — pull requests still run the tests above but publish nothing.
  # Each image is tagged with both the commit SHA (immutable, what the Helm chart
  # deploys for reproducible/rollback-able releases) and a moving `main`/`latest`.
  publish-images:
    needs: [java-services, genai, web-client, e2e-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # The three Spring services share one multi-stage Dockerfile, built from
          # the repo root and differentiated by build args.
          - image: tso-user-progress
            context: .
            file: services/Dockerfile.spring
            build-args: |
              SERVICE=user-progress
              JAVA_PKG=userprogress
              APP_PORT=8081
          - image: tso-catalog
            context: .
            file: services/Dockerfile.spring
            build-args: |
              SERVICE=catalog
              JAVA_PKG=catalog
              APP_PORT=8082
          - image: tso-chat
            context: .
            file: services/Dockerfile.spring
            build-args: |
              SERVICE=chat
              JAVA_PKG=chat
              APP_PORT=8083
          # genai builds from its own directory; the Dockerfile is self-contained.
          - image: tso-genai
            context: services/genai
            file: services/genai/Dockerfile
            build-args: ""
          # web-client builds from the repo root (it needs api/openapi.yaml in context).
          - image: tso-web-client
            context: .
            file: web-client/Dockerfile
            build-args: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name for us (GHCR requires it).
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          build-args: ${{ matrix.build-args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
