name: Deploy to cluster

# Continuous Deployment + on-demand deploys to the course Rancher cluster.
#
# Triggers:
#   1. CD (auto): when the CI workflow finishes SUCCESSFULLY on `main`, deploy that
#      commit. Gated on CI green so a red build never ships. CI's publish-images job
#      already built + pushed the images for that SHA, so this path runs Helm only —
#      no rebuild.
#   2. Manual: Actions tab -> "Deploy to cluster" -> Run workflow -> pick a ref.
#      Builds that ref's images, then deploys.
#   3. PR preview: add the `deploy-staging` label to a PR -> builds + deploys that
#      PR's head and comments the URL back. Shares the single `tso` release/namespace,
#      so it temporarily replaces whatever's deployed; re-run `main` to reset.
#
# `concurrency` serialises deploys so two runs never fight over the cluster.
#
# ── ONE-TIME PREREQUISITES ─────────────────────────────────────────────────────
# Repository secrets (Settings -> Secrets and variables -> Actions):
#   KUBECONFIG_B64     base64 of a kubeconfig built around a Rancher API token
#   JWT_SECRET         app JWT signing secret (same value as infra/k8s/.env)
#   POSTGRES_PASSWORD  db password (same value as infra/k8s/.env)
#   OPENAI_API_KEY     (optional) enables the GenAI path
# Until those exist the `deploy` job fails at the kubeconfig step; `build` still
# works (it only needs the built-in GITHUB_TOKEN).

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to deploy
        default: main
        required: true
  pull_request:
    types: [labeled]

concurrency:
  group: cluster-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  setup:
    # Auto path: only when CI concluded successfully. Manual: always. PR: only the
    # `deploy-staging` label.
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'deploy-staging')
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.pick.outputs.ref }}
      short_sha: ${{ steps.sha.outputs.short_sha }}
      pr: ${{ steps.pick.outputs.pr }}
      build: ${{ steps.pick.outputs.build }}
    steps:
      - id: pick
        run: |
          case "${{ github.event_name }}" in
            workflow_run)
              # CI already built + pushed images for this SHA -> deploy only.
              echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
              echo "pr=" >> "$GITHUB_OUTPUT"
              echo "build=false" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
              echo "pr=" >> "$GITHUB_OUTPUT"
              echo "build=true" >> "$GITHUB_OUTPUT"
              ;;
            pull_request)
              echo "ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
              echo "pr=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
              echo "build=true" >> "$GITHUB_OUTPUT"
              ;;
          esac
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ steps.pick.outputs.ref }}
      - id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  # Build the five images for this ref and push them tagged sha-<short> (what the
  # chart deploys). Skipped on the CD path, where CI already published them.
  # Needs only GITHUB_TOKEN — no cluster secret.
  build:
    needs: setup
    if: needs.setup.outputs.build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: tso-user-progress
            context: .
            file: services/Dockerfile.spring
            build-args: |
              SERVICE=user-progress
              JAVA_PKG=userprogress
              APP_PORT=8081
          - image: tso-catalog
            context: .
            file: services/Dockerfile.spring
            build-args: |
              SERVICE=catalog
              JAVA_PKG=catalog
              APP_PORT=8082
          - image: tso-chat
            context: .
            file: services/Dockerfile.spring
            build-args: |
              SERVICE=chat
              JAVA_PKG=chat
              APP_PORT=8083
          - image: tso-genai
            context: services/genai
            file: services/genai/Dockerfile
            build-args: ""
          - image: tso-web-client
            context: .
            file: web-client/Dockerfile
            build-args: ""
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.setup.outputs.ref }}
      - name: Lowercase owner for GHCR
        id: owner
        run: echo "lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          build-args: ${{ matrix.build-args }}
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.lower }}/${{ matrix.image }}:sha-${{ needs.setup.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [setup, build]
    # Run once setup succeeded and build either passed or was skipped (CD path).
    if: always() && needs.setup.result == 'success' && needs.build.result != 'failure' && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: sha-${{ needs.setup.outputs.short_sha }}
      NAMESPACE: team-special-ops
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.setup.outputs.ref }}
      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
      # kubectl is preinstalled on ubuntu-latest runners.
      - name: Deploy via Helm
        run: ./infra/k8s/deploy.sh rancher
      - name: Summarise
        run: |
          host=$(grep -E '^\s*host:' infra/k8s/chart/values-rancher.yaml | head -1 | awk '{print $2}')
          echo "### Deployed \`${{ needs.setup.outputs.ref }}\` (sha-${{ needs.setup.outputs.short_sha }})" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: https://$host" >> "$GITHUB_STEP_SUMMARY"

  comment:
    needs: [setup, deploy]
    if: always() && needs.setup.outputs.pr != '' && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Comment deploy URL on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          host=$(grep -E '^\s*host:' infra/k8s/chart/values-rancher.yaml | head -1 | awk '{print $2}')
          gh pr comment "${{ needs.setup.outputs.pr }}" --body \
            "🚀 Deployed this PR (\`sha-${{ needs.setup.outputs.short_sha }}\`) to the cluster: https://$host — re-run \`main\` through the **Deploy to cluster** workflow to reset."
