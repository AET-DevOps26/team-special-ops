# Dependabot — https://docs.github.com/code-security/dependabot/dependabot-version-updates
# Monthly cadence + grouped minor/patch + 7-day cooldown keeps PR noise low and
# avoids freshly-broken ".0" releases. Bumps the SHA-pinned actions in our workflows.
version: 2
updates:
  # --- GitHub Actions (keeps the SHA pins in .github/workflows current) ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns: ["*"]
    cooldown:
      default-days: 7

  # --- Java / Spring Boot services (Maven) ---
  - package-ecosystem: maven
    directories:
      - /services
      - /services/catalog
      - /services/chat
      - /services/user-progress
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      maven-minor-patch:
        update-types: [minor, patch]
    cooldown:
      default-days: 7

  # --- Frontend (npm / pnpm) ---
  - package-ecosystem: npm
    directory: /web-client
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    cooldown:
      default-days: 7

  # --- GenAI service (Python / uv) ---
  - package-ecosystem: pip
    directory: /services/genai
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: [minor, patch]
    cooldown:
      default-days: 7
